<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    
    <!-- ── Security Headers (Anti-Hacker) ── -->
    <!-- Mencegah Clickjacking (Iframe spoofing) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Mencegah serangan MIME Sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Mencegah bocornya data referer ke website tidak aman -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Content Security Policy: Membatasi resource yang bisa dimuat (Mencegah XSS) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://flagcdn.com; media-src 'self' https://storage.googleapis.com https://assets.mixkit.co https://res.cloudinary.com; connect-src 'self';" />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Amoures Tour Operator - Jelajahi Dunia Bersama Kami. Paket tur terbaik ke berbagai destinasi wisata." />
    <title>Amoures Tour Operator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
